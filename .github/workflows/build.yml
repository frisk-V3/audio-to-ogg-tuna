name: Multi-OS GUI Build

on: workflow_dispatch

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - os: windows-latest
            out_name: OGG_Tuna_Win.exe
          - os: macos-latest
            out_name: OGG_Tuna_Mac
          - os: ubuntu-latest
            out_name: OGG_Tuna_Linux

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install pyinstaller pydub customtkinter
          # Linuxビルドに必要なライブラリ
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            sudo apt-get install -y python3-tk
          fi
        shell: bash

      - name: Build Binary
        run: |
          # --noconsole: GUIのみ表示
          pyinstaller --onefile --noconsole --name "${{ matrix.out_name }}" main.py
        shell: bash

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GUI_Binary_${{ matrix.os }}
          path: dist/${{ matrix.out_name }}
          retention-days: 1
