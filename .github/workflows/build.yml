name: Multi-OS GUI Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - os: windows-latest
            out_name: OGG_Tuna_Win.exe
            sep: ";"
          - os: macos-latest
            out_name: OGG_Tuna_Mac
            sep: ":"
          - os: ubuntu-latest
            out_name: OGG_Tuna_Linux
            sep: ":"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install pyinstaller pydub customtkinter
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            sudo apt-get update
            sudo apt-get install -y python3-tk
          fi
        shell: bash

      - name: Build Binary
        run: |
          # customtkinterのインストール先を特定
          CPATH=$(python -c "import customtkinter; import os; print(os.path.dirname(customtkinter.__file__))")
          
          # --add-data を使ってライブラリ内のテーマファイルを同梱
          pyinstaller --onefile --noconsole \
            --add-data "${CPATH}${{ matrix.sep }}customtkinter/" \
            --name "${{ matrix.out_name }}" main.py
        shell: bash

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GUI_Binary_${{ matrix.os }}
          path: dist/${{ matrix.out_name }}
          retention-days: 5
