name: Manual Build Audio Converter

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pydub

      - name: Build EXE
        run: |
          # pydubはffmpegに依存するため、EXE自体は軽量に作成
          pyinstaller --onefile --console --name "AudioToOGG_Converter" main.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AudioToOGG_Converter_EXE
          path: dist/AudioToOGG_Converter.exe
          retention-days: 1 # サーバーに優しく最短保存
